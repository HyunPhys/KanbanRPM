name: Release Obsidian plugin

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Package plugin
        run: |
          npm ci
          npm run package
          cd "dist/kanban-rpm-${GITHUB_REF_NAME#v}"
          zip "../kanban-rpm-${GITHUB_REF_NAME#v}.zip" main.js manifest.json styles.css

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          gh release create "$tag" \
            --title="$tag" \
            --notes-file="release-notes.md" \
            main.js manifest.json styles.css "dist/kanban-rpm-${tag#v}.zip"
