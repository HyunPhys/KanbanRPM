name: KanbanRPM Bug Report
description: Report a KanbanRPM bug
labels: ['bug']
title: '[Bug]: '
body:
  - type: markdown
    attributes:
      value: '**Please make sure you are using the latest KanbanRPM release.**'
  - type: textarea
    id: what-happened
    attributes:
      label: Describe the bug
      description: What's happening and when does it happen?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What SHOULD happen?
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: The more detail you provide, the easier it will be to narrow down and fix the bug.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant errors (if available)
      description: Please copy and paste relevant log output. Open Obsidian's Developer Console with CTRL + SHIFT + I or Command + Option + I.
      render: shell
  - type: input
    id: kanban-rpm-version
    attributes:
      label: KanbanRPM version
      description: Example: 0.3.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      description: Which OS are you using?
      options:
        - Windows
        - Linux
        - macOS
        - iOS
        - Android
    validations:
      required: true
